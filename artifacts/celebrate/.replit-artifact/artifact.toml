kind = "web"
previewPath = "/"
title = "Celebration Planner"
version = "1.0.0"
id = "artifacts/celebrate"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22648

[services.development]
run = "pnpm --filter @workspace/celebrate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/celebrate", "run", "build" ]
serve = "static"
publicDir = "artifacts/celebrate/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22648"
BASE_PATH = "/"
